# Repository labels — synced from this file.
# Standard: https://github.com/petry-projects/.github/blob/main/standards/github-settings.md#labels--standard-set

- name: bug
  color: "d73a4a"
  description: Something isn't working

- name: documentation
  color: "0075ca"
  description: Improvements or additions to documentation

- name: duplicate
  color: "cfd3d7"
  description: This issue or pull request already exists

- name: enhancement
  color: "a2eeef"
  description: New feature or request

- name: good first issue
  color: "7057ff"
  description: Good for newcomers

- name: help wanted
  color: "008672"
  description: Extra attention is needed

- name: invalid
  color: "e4e669"
  description: This doesn't seem right

- name: question
  color: "d876e3"
  description: Further information is requested

- name: wontfix
  color: "ffffff"
  description: This will not be worked on

- name: security
  color: "ee0701"
  description: Security related issues and vulnerabilities

- name: dependencies
  color: "0366d6"
  description: Pull requests that update a dependency file

- name: ci
  color: "f9d0c4"
  description: CI/CD pipeline related changes

- name: scorecard
  color: "0075ca"
  description: OpenSSF Scorecard security compliance

- name: in-progress
  color: "fbca04"
  description: An agent is actively working this issue
