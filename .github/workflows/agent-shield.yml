# AgentShield — Agent configuration security validation
# Two-layer approach:
#   1. affaan-m/agentshield — deep security scan (102 rules)
#   2. Org-specific structural checks (required files, frontmatter)

name: AgentShield

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  agent-shield:
    name: AgentShield
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # --- Deep security scan via AgentShield CLI ---
      # Uses ecc-agentshield (https://github.com/affaan-m/agentshield)
      # 102 rules: secrets, permissions, hooks, MCP servers, agent config
      - name: AgentShield Security Scan
        run: |
          npx ecc-agentshield@1.4.0 scan \
            --path . \
            --min-severity high \
            --format terminal

      # --- Org-specific structural checks ---
      - name: Check required agent files exist
        run: |
          status=0

          if [ ! -f "CLAUDE.md" ]; then
            echo "::error::Missing CLAUDE.md"
            status=1
          fi

          if [ ! -f "AGENTS.md" ]; then
            echo "::error::Missing AGENTS.md"
            status=1
          fi

          exit $status

      - name: Validate cross-references
        run: |
          status=0

          if [ -f "CLAUDE.md" ] && \
             ! grep -qi 'AGENTS.md' CLAUDE.md; then
            echo "::error file=CLAUDE.md::Must reference AGENTS.md"
            status=1
          fi

          if [ -f "AGENTS.md" ] && \
             ! grep -qi 'petry-projects/\.github' AGENTS.md; then
            echo "::error file=AGENTS.md::Must reference org standards"
            status=1
          fi

          exit $status

      - name: Validate SKILL.md frontmatter
        run: |
          status=0

          while IFS= read -r file; do
            frontmatter=$(awk \
              '/^---$/{n++; next} n==1{print} n>=2{exit}' \
              "$file")

            if [ -z "$frontmatter" ]; then
              echo "::error file=$file::Missing YAML frontmatter"
              status=1
              continue
            fi

            if ! echo "$frontmatter" | grep -q '^name:'; then
              echo "::error file=$file::Missing 'name' field"
              status=1
            fi
            if ! echo "$frontmatter" | grep -q '^description:'; then
              echo "::error file=$file::Missing 'description' field"
              status=1
            fi
          done < <(find . -name 'SKILL.md' \
            -not -path '*/node_modules/*' \
            -not -path '*/.git/*')

          if [ "$status" -eq 0 ]; then
            echo "All SKILL.md frontmatter validated."
          fi
          exit $status

      - name: Validate module-help.csv consistency
        if: hashFiles('src/module-help.csv') != ''
        run: |
          status=0

          if [ -d "src/agents" ]; then
            for dir in src/agents/*/; do
              [ -d "$dir" ] || continue
              skill_name=$(basename "$dir")
              if ! awk -F',' -v name="$skill_name" \
                '{gsub(/^[ ]+|[ ]+$/, "", $2)}
                 $2 == name {found=1; exit}
                 END {exit !found}' src/module-help.csv; then
                echo "::error::Agent $skill_name not in module-help.csv"
                status=1
              fi
            done
          fi

          if [ -d "src/workflows" ]; then
            for dir in src/workflows/*/; do
              [ -d "$dir" ] || continue
              skill_name=$(basename "$dir")
              if ! awk -F',' -v name="$skill_name" \
                '{gsub(/^[ ]+|[ ]+$/, "", $2)}
                 $2 == name {found=1; exit}
                 END {exit !found}' src/module-help.csv; then
                echo "::error::Workflow $skill_name not in module-help.csv"
                status=1
              fi
            done
          fi

          if [ "$status" -eq 0 ]; then
            echo "Module-help.csv consistency check passed."
          fi
          exit $status
