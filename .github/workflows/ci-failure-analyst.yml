# ─────────────────────────────────────────────────────────────────────────────
# SOURCE OF TRUTH: petry-projects/.github-private/standards/workflows/ci-failure-analyst.yml
# Standard:        petry-projects/.github-private/docs/aw/ci-failure-analyst.md
# Reusable:        petry-projects/.github-private/.github/workflows/ci-failure-analyst-reusable.yml
#
# AGENTS — READ BEFORE EDITING:
#   • This file is a THIN CALLER STUB. All analysis logic lives in the reusable
#     workflow above (failing-step identification, root-cause classification,
#     and PR comment posting).
#   • You MAY change: the SHA in the `uses:` line when upgrading the reusable
#     workflow version; the `workflows:` filter list when adding, renaming, or
#     removing a workflow in this repo.
#   • You MUST NOT change: the `workflow_run` trigger type, the `uses:` line
#     structure, the concurrency group format, or the `if:` condition
#     (loop-prevention guard).
#   • If you need different behaviour, open a PR against the reusable in the
#     central repo.
# ─────────────────────────────────────────────────────────────────────────────
#
# CI Failure Analyst — thin caller for the org-level reusable.
# To adopt: copy this file to .github/workflows/ci-failure-analyst.yml in your repo.
# Required org/repo secrets:
#   CLAUDE_CODE_OAUTH_TOKEN  org secret — must be granted to this repo in org
#                            secret settings (Settings -> Secrets -> Actions)
#
# This workflow is independent of dev-lead. Both can coexist in the same repo:
#   dev-lead             — diagnoses and attempts to fix CI failures (writes commits)
#   ci-failure-analyst   — diagnoses only, always posts a fast diagnostic comment
#
# Docs: https://github.com/petry-projects/.github-private/blob/main/docs/aw/ci-failure-analyst.md
# ─────────────────────────────────────────────────────────────────────────────

name: "CI Failure Analyst"

on:
  workflow_run:
    # Explicit opt-in allowlist — intentional over a wildcard so transient or
    # experimental workflow completions don't generate analyst noise. All 14
    # entries here match the `name:` value of a workflow file in this repo.
    # When adding a new workflow that should trigger failure analysis, add its
    # exact `name:` value to this list. When renaming a workflow, update its
    # entry here at the same time.
    workflows:
      - CI
      - AgentShield
      - Apply repository settings
      - Auto-rebase non-Dependabot PRs
      - Claude Code
      - Copilot Setup Steps
      - Dependabot auto-merge
      - Dependabot update and merge
      - Dependency audit
      - Dev-Lead Agent
      - PR Auto-Review — Ready Check
      - PR Review — Mention Trigger
      - PR Review Agent
      - SonarCloud Analysis
    types: [completed]

permissions: {}

concurrency:
  group: "ci-failure-analyst-${{ github.event.workflow_run.head_sha }}"
  cancel-in-progress: false

jobs:
  analyze:
    permissions:
      pull-requests: write
      issues: write        # post/read PR comments via the Issues comments API
      actions: read
      contents: read
      checks: read
    # Skip non-failures and the analyst's own workflow run to prevent loops.
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      !startsWith(github.event.workflow_run.name, 'CI Failure Analyst')
    uses: petry-projects/.github-private/.github/workflows/ci-failure-analyst-reusable.yml@9227d2630161c7fa5c91f8eb39daede127c93b5c # main @ 2026-05-23
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
