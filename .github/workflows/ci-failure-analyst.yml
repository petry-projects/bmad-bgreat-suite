# Deploy this file to target repos as: .github/workflows/ci-failure-analyst.yml
#
# Purpose: Posts a read-only diagnostic comment on PRs within 2 minutes of a
#   CI check failure. Identifies the failing step, classifies the root cause,
#   and suggests a concrete fix action.
#
# All analysis logic lives in petry-projects/.github-private — this stub is
# intentionally minimal. The `uses:` SHA pin should be updated to pick up
# improvements or bug fixes from the central reusable workflow over time.
#
# Requirements:
#   CLAUDE_CODE_OAUTH_TOKEN  org secret — must be granted to this repo in org
#                            secret settings (Settings -> Secrets -> Actions)
#
# This workflow is independent of dev-lead. Both can coexist in the same repo:
#   dev-lead        — diagnoses and attempts to fix CI failures (writes commits)
#   ci-failure-analyst — diagnoses only, always posts a fast diagnostic comment
#
# NOTE: workflow_run is needed to catch GitHub Actions native CI failures —
#   check_run events are not dispatched to GitHub Actions workflows for runs
#   created by GitHub Actions itself. The private reusable does not yet support
#   workflow_run; when it does, add a workflow_run trigger listing these names:
#     "CI", "AgentShield", "Dependency audit", "SonarCloud Analysis"
#   check_run covers third-party checks (e.g. SonarCloud, external GitHub Apps).
#
# Docs: https://github.com/petry-projects/.github-private/blob/main/docs/aw/ci-failure-analyst.md
# ─────────────────────────────────────────────────────────────────────────────

name: "CI Failure Analyst"

on:
  check_run:
    types: [completed]

permissions: {}

concurrency:
  group: "ci-failure-analyst-${{ github.event.check_run.id }}"
  cancel-in-progress: false

jobs:
  analyze:
    # Skip non-failure conclusions, the analyst's own run (prevent loops), and
    # runs not associated with any PR (no-op context for the reusable).
    # Restricted to check_run only: the pinned reusable reads
    # github.event.check_run.* fields that are null for workflow_run payloads,
    # causing the PR-resolution step to error. Re-enable workflow_run in the
    # on: trigger once the reusable accepts workflow_run inputs.
    if: >-
      github.event_name == 'check_run' &&
      contains(fromJSON('["failure","timed_out","cancelled","startup_failure"]'), github.event.check_run.conclusion) &&
      !startsWith(github.event.check_run.name, 'CI Failure Analyst') &&
      github.event.check_run.pull_requests.length > 0
    uses: petry-projects/.github-private/.github/workflows/ci-failure-analyst-reusable.yml@121bee881bd13715706d30230b2d5a8d2d78b0b1 # main
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    permissions:
      pull-requests: write
      issues: write
      actions: read
      contents: read
      checks: read
