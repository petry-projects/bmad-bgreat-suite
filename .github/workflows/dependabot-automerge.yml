name: Dependabot auto-merge

on:
  pull_request_target:
    branches:
      - main

permissions: {}

jobs:
  dependabot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@ffa630c65fa7e0ecfa0625b5ceda64399aea1b36 # v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Determine if auto-merge eligible
        id: eligible
        run: |
          UPDATE_TYPE="${{ steps.metadata.outputs.update-type }}"
          DEPENDENCY_TYPE="${{ steps.metadata.outputs.dependency-type }}"
          ECOSYSTEM="${{ steps.metadata.outputs.package-ecosystem }}"

          # Auto-merge direct dependencies: minor and patch only
          # Auto-merge indirect dependencies: patch only (minor/major require review)
          if [[ "$DEPENDENCY_TYPE" == "indirect" ]]; then
            if [[ "$UPDATE_TYPE" != "version-update:semver-patch" ]]; then
              echo "eligible=false" >> "$GITHUB_OUTPUT"
              echo "Skipping: indirect dependency updates only auto-merge for patch"
              exit 0
            fi
          else
            if [[ "$UPDATE_TYPE" != "version-update:semver-patch" && \
                  "$UPDATE_TYPE" != "version-update:semver-minor" ]]; then
              echo "eligible=false" >> "$GITHUB_OUTPUT"
              echo "Skipping: only patch/minor updates are auto-merge eligible"
              exit 0
            fi
          fi

          echo "eligible=true" >> "$GITHUB_OUTPUT"
          echo "Auto-merge eligible: ecosystem=$ECOSYSTEM update=$UPDATE_TYPE dependency=$DEPENDENCY_TYPE"

      - name: Generate app token
        if: steps.eligible.outputs.eligible == 'true'
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Approve and enable auto-merge
        if: steps.eligible.outputs.eligible == 'true'
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
