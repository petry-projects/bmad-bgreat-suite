#
# AGENTS — READ BEFORE EDITING:
#   • This file is a THIN CALLER STUB. All review-dispatch logic lives in the
#     reusable workflow above.
#   • You MUST NOT change: the `uses:` ref — it is pinned to the
#     `pr-review-mention/stable` channel, a moving tag advanced centrally.
#     Never repoint it to `@main`, a SHA, or a frozen `@vX` (see
#     ci-standards.md → Reusable workflow versioning). Also do not change the
#     trigger events or the job-level `permissions:` block — reusable workflows
#     can be granted no more permissions than the calling job, so removing the
#     stanza breaks the reusable's gh API calls.
#   • If you need different behaviour, open a PR against the reusable in the
#     central repo. A new release is rolled out by moving the channel tag
#     centrally — never by editing callers, so no fanout PR is needed.
# ─────────────────────────────────────────────────────────────────────────────
#
# PR Review Mention — thin caller for the org-level reusable.
# To adopt: copy this file to .github/workflows/pr-review-mention.yml in your repo.
# Requires: GH_PAT_WORKFLOWS org secret (already present in petry-projects org).
name: PR Review — Mention Trigger

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [review_requested]

permissions: {}

jobs:
  pr-review-mention:
    # Bot-authored comment events (e.g. GitHub Copilot, CodeRabbit posting review
    # comments) trigger this workflow but are gated by GitHub as `action_required`
    # (pending manual approval); they never run, and Fleet Monitor counts them as
    # failures, pushing the failure rate over threshold (issue #402). The mention
    # trigger only needs to respond to human @-mentions, so skip comment events
    # whose author is a Bot. Uses the structural comment-author type, not
    # spoofable actor/identity fields (S6931). For pull_request (review_requested)
    # events there is no comment object, so the field is null and the job runs.
    if: ${{ github.event.comment.user.type != 'Bot' }}
    permissions:
      pull-requests: write
    uses: petry-projects/.github/.github/workflows/pr-review-mention-reusable.yml@pr-review-mention/v2-ring1  # NOSONAR(githubactions:S7637) first-party channel ref
    secrets: inherit  # NOSONAR(githubactions:S7635) first-party trusted reusable
