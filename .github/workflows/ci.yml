name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install PyYAML
        # Retry to absorb transient PyPI/network hiccups so a single failed
        # download does not fail the whole CI run (Fleet Monitor issue #381).
        run: |
          for attempt in 1 2 3; do
            if pip install --only-binary :all: pyyaml==6.0.2; then
              exit 0
            fi
            if [[ $attempt -lt 3 ]]; then
              echo "PyYAML install attempt ${attempt} failed; retrying in $((attempt * 5))s" >&2
              sleep "$((attempt * 5))"
            fi
          done
          echo "::error::PyYAML install failed after 3 attempts"
          exit 1

      - name: Validate YAML files
        run: |
          status=0
          while IFS= read -r file; do
            if ! python3 -c "import yaml, sys; yaml.safe_load(open(sys.argv[1]))" "$file" 2>/dev/null; then
              echo "::error file=$file::Invalid YAML syntax"
              status=1
            fi
          done < <(find . \( -name '*.yaml' -o -name '*.yml' \) -not -path '*/node_modules/*' -not -path '*/.git/*')
          exit $status

      - name: Validate module structure
        run: |
          status=0

          # Check required module files exist
          for f in src/module.yaml src/module-help.csv; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              status=1
            fi
          done

          # Check that agent and workflow directories exist
          if [ ! -d "src/agents" ]; then
            echo "::error::Missing src/agents/ directory"
            status=1
          fi
          if [ ! -d "src/workflows" ]; then
            echo "::error::Missing src/workflows/ directory"
            status=1
          fi

          # Check every agent has SKILL.md and manifest
          for dir in src/agents/*/; do
            [ -d "$dir" ] || continue
            if [ ! -f "$dir/SKILL.md" ]; then
              echo "::error::Missing SKILL.md in $dir"
              status=1
            fi
            if [ ! -f "$dir/bmad-skill-manifest.yaml" ]; then
              echo "::error::Missing bmad-skill-manifest.yaml in $dir"
              status=1
            fi
          done

          # Check every workflow has required files
          for dir in src/workflows/*/; do
            [ -d "$dir" ] || continue
            if [ ! -f "$dir/SKILL.md" ]; then
              echo "::error::Missing SKILL.md in $dir"
              status=1
            fi
            if [ ! -f "$dir/workflow.md" ]; then
              echo "::error::Missing workflow.md in $dir"
              status=1
            fi
            if [ ! -d "$dir/steps" ]; then
              echo "::error::Missing steps/ directory in $dir"
              status=1
            fi
            if [ ! -d "$dir/templates" ]; then
              echo "::error::Missing templates/ directory in $dir"
              status=1
            fi
          done

          if [ "$status" -eq 0 ]; then
            echo "Module structure validation passed."
          fi
          exit $status

      - name: Validate module-help.csv consistency
        run: |
          status=0

          # Check that every agent directory is registered in module-help.csv
          for dir in src/agents/*/; do
            [ -d "$dir" ] || continue
            skill_name=$(basename "$dir")
            if ! awk -F',' -v name="$skill_name" 'gsub(/^[[:space:]]+|[[:space:]]+$/, "", $2) == 0 && $2 == name { found=1; exit } END { exit !found }' src/module-help.csv; then
              echo "::error::Agent $skill_name not registered in module-help.csv"
              status=1
            fi
          done

          # Check that every workflow directory is registered in module-help.csv
          for dir in src/workflows/*/; do
            [ -d "$dir" ] || continue
            skill_name=$(basename "$dir")
            if ! awk -F',' -v name="$skill_name" 'gsub(/^[[:space:]]+|[[:space:]]+$/, "", $2) == 0 && $2 == name { found=1; exit } END { exit !found }' src/module-help.csv; then
              echo "::error::Workflow $skill_name not registered in module-help.csv"
              status=1
            fi
          done

          if [ "$status" -eq 0 ]; then
            echo "Module-help.csv consistency check passed."
          fi
          exit $status

      - name: Validate copilot-setup-steps job name
        run: bash tools/test-copilot-setup-steps.sh

      - name: Validate skill structural integrity
        run: bash tools/validate-skills.sh

      - name: Validate repo-settings script coverage
        run: bash tools/test-repo-settings.sh

      - name: Validate dev-lead concurrency guard
        run: bash tools/test-dev-lead-concurrency.sh

      - name: Validate secret-scan job compliance
        run: bash tools/test-ci-secret-scan.sh

      - name: Validate dependency hardening
        run: bash tools/test-ci-dependency-hardening.sh

      - name: Validate PyYAML install retry hardening
        run: bash tools/test-ci-pip-retry.sh

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    # Dependabot runs workflows with a restricted secret context, so the
    # licensed gitleaks-action's required GITLEAKS_LICENSE is unavailable and the
    # job fails with "missing gitleaks license" (Fleet Monitor issue #397).
    # Dependabot only bumps dependency pins and cannot introduce secrets, so skip
    # the scan on its events; full coverage still runs on all human/push runs.
    if: ${{ github.actor != 'dependabot[bot]' }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        with:
          args: --redact --verbose --exit-code 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
