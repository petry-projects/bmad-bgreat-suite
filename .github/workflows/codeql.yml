name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  analyze:
    name: Analyze (actions)
    runs-on: ubuntu-latest
    # Bootstrap guard: skip on pull_request while CodeQL default-setup is still active.
    # GitHub rejects SARIF uploads when both default and advanced setup are enabled.
    # apply-repo-settings.sh disables default-setup on push to main; remove this
    # condition in a follow-up commit after that first run completes.
    if: github.event_name != 'pull_request'
    permissions:
      security-events: write  # Upload SARIF results to GitHub Security tab
      contents: read          # Check out repository code for analysis
      actions: read           # Read Actions workflow files (analyzed language)
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          languages: actions

      - name: Analyze
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: /language:actions
