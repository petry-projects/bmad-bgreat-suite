# Apply repository settings — enforces check-suite auto-trigger preferences and
# any other settings defined in scripts/apply-repo-settings.sh.
#
# Runs on push to main and on manual dispatch so settings are re-applied
# automatically after each merge and are recoverable via workflow_dispatch.
name: Apply repository settings

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  apply-settings:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout only; repo-admin API calls use GH_PAT_WORKFLOWS
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
      - name: Apply repository settings
        # The default GITHUB_TOKEN cannot be granted repo-admin scope, which the
        # check-suites/security/code-scanning API calls require, so authenticate
        # with the org's classic PAT instead.
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_WORKFLOWS }}
        run: bash scripts/apply-repo-settings.sh "${{ github.repository }}"
