sonar.projectKey=petry-projects_bmad-bgreat-suite
sonar.organization=petry-projects
sonar.projectName=bmad-bgreat-suite
sonar.sources=.
sonar.exclusions=_bmad/**,_bmad-output/**,.claude/**,.github/workflows/pr-review.yml

# SonarCloud S7637 exemption for first-party reusable-ref caller stubs.
# These thin caller stubs contain ONLY a petry-projects/.github(-private)
# reusable `uses:` ref, pinned to a moving channel/tag (`@<name>/stable`,
# `@v1`/`@v2`) by org standard — intentionally NOT SHA-pinned (see
# standards/ci-standards.md#sonarcloud-exemption-first-party-reusable-ref-s7637
# and the Action Pinning Policy exemption). S7637 is suppressed on each stub
# file individually; ci.yml / sonarcloud.yml and any third-party `uses:` keep
# full SHA-pin enforcement — do NOT replace these with a blanket
# `workflows/*.yml` resourceKey.
sonar.issue.ignore.multicriteria=s7637_agentshield,s7637_prreviewmention,s7637_prautoreview,s7637_autorebase,s7637_dependabotrebase,s7637_dependabotautomerge,s7637_dependencyaudit,s7637_addtoproject,s7637_devlead,s7637_initiativeplanner,s7637_initiativetriage,s7637_featureideation,s7635_initiativeplanner,s7635_initiativetriage,s7637_cifailureanalyst,s7637_ideatriage

sonar.issue.ignore.multicriteria.s7637_agentshield.ruleKey=githubactions:S7637
sonar.issue.ignore.multicriteria.s7637_agentshield.resourceKey=**/.github/workflows/agent-shield.yml

sonar.issue.ignore.multicriteria.s7637_prreviewmention.ruleKey=githubactions:S7637
sonar.issue.ignore.multicriteria.s7637_prreviewmention.resourceKey=**/.github/workflows/pr-review-mention.yml

sonar.issue.ignore.multicriteria.s7637_prautoreview.ruleKey=githubactions:S7637
